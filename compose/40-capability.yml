# Phase 2 — capability services: Presidio (PII), TEI (embeddings), OPA (authz).
# All optional in the sense that langgraph-app degrades gracefully if any of
# them is down (offline fallbacks live in app/clients/*). They are however
# REQUIRED for `make test-e2e-phase2` to pass the security acceptance bar.

networks:
  t2sql-net:
    external: true

volumes:
  tei-data:

services:
  presidio-analyzer:
    image: mcr.microsoft.com/presidio-analyzer:latest
    container_name: t2sql-presidio-analyzer
    restart: unless-stopped
    networks: [t2sql-net]
    ports:
      - "${PRESIDIO_ANALYZER_PORT:-5001}:3000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:3000/health', timeout=20).status==200 else sys.exit(1)"]
      interval: 15s
      timeout: 25s
      retries: 10
      start_period: 60s

  presidio-anonymizer:
    image: mcr.microsoft.com/presidio-anonymizer:latest
    container_name: t2sql-presidio-anonymizer
    restart: unless-stopped
    networks: [t2sql-net]
    ports:
      - "${PRESIDIO_ANONYMIZER_PORT:-5002}:3000"
    # gunicorn sync worker (1 worker) blocks on lazy load of OperatorsConfig the
    # first time anything hits the app. Give it a generous start_period and a
    # longer per-probe timeout so the healthcheck doesn't permanently stick in
    # 'starting' and gate langgraph-app/chainlit-ui from leaving Created state.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:3000/health', timeout=20).status==200 else sys.exit(1)"]
      interval: 15s
      timeout: 25s
      retries: 10
      start_period: 60s

  # CPU image; small bge-small-en-v1.5 (384-dim) keeps first-pull < 200 MB.
  # Override TEI_MODEL_ID in .env to swap models.
  tei-embed:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    container_name: t2sql-tei-embed
    restart: unless-stopped
    networks: [t2sql-net]
    command:
      - "--model-id=${TEI_MODEL_ID:-BAAI/bge-small-en-v1.5}"
      - "--port=80"
    environment:
      HF_HUB_OFFLINE: "1"
    volumes:
      - tei-data:/data
    ports:
      - "${TEI_EMBED_PORT:-8082}:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:80/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 30

  opa:
    image: openpolicyagent/opa:latest
    container_name: t2sql-opa
    restart: unless-stopped
    networks: [t2sql-net]
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "/policies"
    volumes:
      - ../config/opa/policies:/policies:ro
    ports:
      - "${OPA_PORT:-8181}:8181"
    healthcheck:
      test: ["CMD", "/opa", "eval", "--data=/policies", "data.text2sql.allowed_ops"]
      interval: 10s
      timeout: 5s
      retries: 20
