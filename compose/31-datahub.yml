# ═══════════════════════════════════════════════════════════════════════════
# DataHub slim quickstart — NOT IN DEFAULT STACK.
# ═══════════════════════════════════════════════════════════════════════════
# Start manually:  make up-datahub   or   docker compose -f compose/31-datahub.yml up -d
# Frontend UI:     http://localhost:${DATAHUB_FRONTEND_PORT:-9002}
# ----------------------------------------------------------------------------
# DataHub catalog/glossary/lineage is NOT wired into the query pipeline.
# langgraph-app does not call DataHub APIs yet (tracked as Phase 3 / L3).
# Keep this file for reference; do NOT include in default stack.
# ----------------------------------------------------------------------------
# This is a minimal subset of acryldata's official quickstart that's enough
# to drive the Glossary / Dataset / Lineage UI for the CIB pilot.
#
# Heavy components intentionally omitted vs. full quickstart:
#   - neo4j (lineage falls back to ES — fine for pilot scale)
#   - schema-registry / kafka-rest (we don't ingest streams)
#   - datahub-actions (no slack/teams notifications yet)
#   - datahub-mae-consumer / mce-consumer (GMS handles in-process at this scale)
#
# Bring up:        make up-datahub
# Tear down:       make down-datahub
# Ingest CIB:      make datahub-ingest
#
# First boot ~3-5 min (ES + Kafka warm-up + datahub-upgrade init job).
# Disk: ~2GB images + ~1GB data on named volumes.
# Memory: ~4GB RAM peak (ES is the main consumer).

networks:
  t2sql-net:
    external: true

volumes:
  dh-mysql-data:
  dh-es-data:
  dh-kafka-data:
  dh-zk-data:
  dh-zk-log:

# DataHub image version pinned for reproducibility.
# Bump in lockstep across upgrade / gms / frontend.
# x-datahub-version: v0.13.3

services:
  # ---- Storage tier ----
  datahub-mysql:
    image: mysql:8.0.32
    container_name: t2sql-dh-mysql
    restart: unless-stopped
    networks: [t2sql-net]
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_bin
      - --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${DATAHUB_MYSQL_PASSWORD:-datahub}
      MYSQL_DATABASE: datahub
      MYSQL_USER: datahub
      MYSQL_PASSWORD: ${DATAHUB_MYSQL_PASSWORD:-datahub}
    volumes:
      - dh-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-pdatahub"]
      interval: 10s
      timeout: 5s
      retries: 30

  datahub-elasticsearch:
    image: elasticsearch:7.17.20
    container_name: t2sql-dh-es
    restart: unless-stopped
    networks: [t2sql-net]
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx1g"
    volumes:
      - dh-es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  datahub-zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: t2sql-dh-zk
    restart: unless-stopped
    networks: [t2sql-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - dh-zk-data:/var/lib/zookeeper/data
      - dh-zk-log:/var/lib/zookeeper/log

  datahub-kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: t2sql-dh-kafka
    restart: unless-stopped
    networks: [t2sql-net]
    depends_on:
      - datahub-zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: datahub-zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://datahub-kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_MESSAGE_MAX_BYTES: 5242880
      KAFKA_MAX_MESSAGE_BYTES: 5242880
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
    volumes:
      - dh-kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30

  # Confluent Schema Registry — required by GMS to (de)serialize Kafka events
  # in v0.13.3. The INTERNAL schema registry was introduced in a later release.
  datahub-schema-registry:
    image: confluentinc/cp-schema-registry:7.4.0
    container_name: t2sql-dh-schema-registry
    restart: unless-stopped
    networks: [t2sql-net]
    depends_on:
      datahub-kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: datahub-schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_SECURITY_PROTOCOL: PLAINTEXT
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: datahub-kafka:9092
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8081 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  # ---- One-shot init: creates MySQL schema, ES indices, Kafka topics ----
  datahub-mysql-setup:
    image: acryldata/datahub-mysql-setup:v0.13.3
    container_name: t2sql-dh-mysql-setup
    networks: [t2sql-net]
    depends_on:
      datahub-mysql:
        condition: service_healthy
    environment:
      MYSQL_HOST: datahub-mysql
      MYSQL_PORT: 3306
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${DATAHUB_MYSQL_PASSWORD:-datahub}
      DATAHUB_DB_NAME: datahub

  datahub-elasticsearch-setup:
    image: acryldata/datahub-elasticsearch-setup:v0.13.3
    container_name: t2sql-dh-es-setup
    networks: [t2sql-net]
    depends_on:
      datahub-elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOST: datahub-elasticsearch
      ELASTICSEARCH_PORT: 9200
      ELASTICSEARCH_PROTOCOL: http
      USE_AWS_ELASTICSEARCH: "false"

  # Pre-creates the DataHub Kafka topics so GMS doesn't spin on
  # LEADER_NOT_AVAILABLE warnings while auto-creation races with consumers.
  datahub-kafka-setup:
    image: acryldata/datahub-kafka-setup:v0.13.3
    container_name: t2sql-dh-kafka-setup
    networks: [t2sql-net]
    depends_on:
      datahub-kafka:
        condition: service_healthy
      datahub-schema-registry:
        condition: service_healthy
    environment:
      DATAHUB_PRECREATE_TOPICS: "true"
      KAFKA_BOOTSTRAP_SERVER: datahub-kafka:9092
      KAFKA_ZOOKEEPER_CONNECT: datahub-zookeeper:2181
      USE_CONFLUENT_SCHEMA_REGISTRY: "TRUE"

  datahub-upgrade:
    image: acryldata/datahub-upgrade:v0.13.3
    container_name: t2sql-dh-upgrade
    networks: [t2sql-net]
    command: ["-u", "SystemUpdate"]
    depends_on:
      datahub-mysql-setup:
        condition: service_completed_successfully
      datahub-elasticsearch-setup:
        condition: service_completed_successfully
      datahub-kafka-setup:
        condition: service_completed_successfully
    environment:
      EBEAN_DATASOURCE_USERNAME: datahub
      EBEAN_DATASOURCE_PASSWORD: ${DATAHUB_MYSQL_PASSWORD:-datahub}
      EBEAN_DATASOURCE_HOST: datahub-mysql:3306
      EBEAN_DATASOURCE_URL: jdbc:mysql://datahub-mysql:3306/datahub?verifyServerCertificate=false&useSSL=true&useUnicode=yes&characterEncoding=UTF-8
      EBEAN_DATASOURCE_DRIVER: com.mysql.cj.jdbc.Driver
      KAFKA_BOOTSTRAP_SERVER: datahub-kafka:9092
      ELASTICSEARCH_HOST: datahub-elasticsearch
      ELASTICSEARCH_PORT: 9200
      DATAHUB_GMS_HOST: datahub-gms
      DATAHUB_GMS_PORT: 8080
      # Required: upgrade job loads the entity registry from this path on disk.
      # Default Spring config uses a relative path that doesn't resolve at runtime →
      # FileNotFoundException on .../metadata-models/src/main/resources/entity-registry.yml
      ENTITY_REGISTRY_CONFIG_PATH: /datahub/datahub-gms/resources/entity-registry.yml

  # ---- GMS: metadata API + storage backend ----
  datahub-gms:
    image: acryldata/datahub-gms:v0.13.3
    container_name: t2sql-dh-gms
    restart: unless-stopped
    networks: [t2sql-net]
    depends_on:
      datahub-upgrade:
        condition: service_completed_successfully
    environment:
      EBEAN_DATASOURCE_USERNAME: datahub
      EBEAN_DATASOURCE_PASSWORD: ${DATAHUB_MYSQL_PASSWORD:-datahub}
      EBEAN_DATASOURCE_HOST: datahub-mysql:3306
      EBEAN_DATASOURCE_URL: jdbc:mysql://datahub-mysql:3306/datahub?verifyServerCertificate=false&useSSL=true&useUnicode=yes&characterEncoding=UTF-8
      EBEAN_DATASOURCE_DRIVER: com.mysql.cj.jdbc.Driver
      KAFKA_BOOTSTRAP_SERVER: datahub-kafka:9092
      ELASTICSEARCH_HOST: datahub-elasticsearch
      ELASTICSEARCH_PORT: 9200
      ENTITY_REGISTRY_CONFIG_PATH: /datahub/datahub-gms/resources/entity-registry.yml
      # We don't run neo4j; force GMS to use ES for the graph service so the
      # start.sh wait-for-neo4j loop is skipped (otherwise it polls "http://"
      # forever with "no Host in request URL").
      GRAPH_SERVICE_IMPL: elasticsearch
      GRAPH_SERVICE_DIFF_MODE_ENABLED: "true"
      ELASTICSEARCH_INDEX_BUILDER_MAPPINGS_REINDEX: "true"
      ELASTICSEARCH_INDEX_BUILDER_SETTINGS_REINDEX: "true"
      ENTITY_SERVICE_ENABLE_RETENTION: "true"
      ES_BULK_REFRESH_POLICY: WAIT_UNTIL
      KAFKA_SCHEMAREGISTRY_URL: http://datahub-schema-registry:8081
      KAFKA_CONSUMER_STOP_ON_DESERIALIZATION_ERROR: "true"
      DATAHUB_UPGRADE_HISTORY_KAFKA_CONSUMER_GROUP_ID: generic-duhe-consumer-job-client-gms
      MAE_CONSUMER_ENABLED: "true"
      MCE_CONSUMER_ENABLED: "true"
      PE_CONSUMER_ENABLED: "true"
      UI_INGESTION_ENABLED: "true"
      DATAHUB_SERVER_TYPE: quickstart
      DATAHUB_TELEMETRY_ENABLED: "false"
      JAVA_OPTS: "-Xms1g -Xmx2g"
      METADATA_SERVICE_AUTH_ENABLED: "false"
    ports:
      - "${DATAHUB_GMS_PORT:-8090}:8080"
    # GMS image has no curl; use wget which IS installed.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 60
      start_period: 180s

  # ---- Frontend UI (React) ----
  datahub-frontend:
    image: acryldata/datahub-frontend-react:v0.13.3
    container_name: t2sql-dh-frontend
    restart: unless-stopped
    networks: [t2sql-net]
    depends_on:
      datahub-gms:
        condition: service_healthy
    environment:
      DATAHUB_GMS_HOST: datahub-gms
      DATAHUB_GMS_PORT: 8080
      DATAHUB_SECRET: ${DATAHUB_SECRET:-YouKnowNothing}
      DATAHUB_APP_VERSION: 1.0
      DATAHUB_PLAY_MEM_BUFFER_SIZE: 10MB
      JAVA_OPTS: "-Xms256m -Xmx512m -Dhttp.port=9002 -Dconfig.file=datahub-frontend/conf/application.conf -Djava.security.auth.login.config=datahub-frontend/conf/jaas.conf -Dlogback.configurationFile=datahub-frontend/conf/logback.xml -Dlogback.debug=false -Dpidfile.path=/dev/null"
      KAFKA_BOOTSTRAP_SERVER: datahub-kafka:9092
      DATAHUB_TRACKING_TOPIC: DataHubUsageEvent_v1
      ELASTIC_CLIENT_HOST: datahub-elasticsearch
      ELASTIC_CLIENT_PORT: 9200
      AUTH_JAAS_ENABLED: "true"
      METADATA_SERVICE_AUTH_ENABLED: "false"
    ports:
      - "${DATAHUB_FRONTEND_PORT:-9002}:9002"
    # Frontend image lacks curl; use wget which IS installed.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9002/admin > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 60s
