# Data services: Trino query engine.
# Cube (semantic layer) is NOT wired into the pipeline — its /meta endpoint
# is never called by langgraph-app.  Schema metadata currently lives in
# app/schema_catalog.py.  Restore cube when Phase 3 lands the Cube /meta
# auto-discovery integration.

networks:
  t2sql-net:
    external: true

services:
  trino:
    image: trinodb/trino:442
    container_name: t2sql-trino
    restart: unless-stopped
    networks: [t2sql-net]
    depends_on:
      postgres-cib:
        condition: service_healthy
    ports:
      - "${TRINO_PORT:-8081}:8080"
    volumes:
      - ../config/trino/etc:/etc/trino:ro
    healthcheck:
      test: ["CMD", "/usr/bin/curl", "-fsS", "http://localhost:8080/v1/info"]
      interval: 10s
      timeout: 5s
      retries: 30

