# ═══════════════════════════════════════════════════════════════════════════
# Phase 4 — Observability stack — NOT IN DEFAULT STACK.
# ═══════════════════════════════════════════════════════════════════════════
# Start manually:  make up-obs   or   docker compose -f compose/70-observability.yml up -d
# ----------------------------------------------------------------------------
# Prometheus + Grafana + Loki + Tempo + Alertmanager + OTel Collector.
# All services single-binary / dev-grade. No persistent volumes so a
# `down -v` cleanly resets the stack.

networks:
  t2sql-net:
    external: true

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  tempo-data:

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: t2sql-prometheus
    restart: unless-stopped
    networks: [t2sql-net]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ../config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../config/prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 10

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: t2sql-alertmanager
    restart: unless-stopped
    networks: [t2sql-net]
    volumes:
      - ../config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command: ["--config.file=/etc/alertmanager/alertmanager.yml"]
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9093/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 10

  loki:
    image: grafana/loki:2.9.10
    container_name: t2sql-loki
    restart: unless-stopped
    networks: [t2sql-net]
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ../config/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3100/ready | grep -q ready"]
      interval: 15s
      timeout: 5s
      retries: 20

  # Promtail: ships every container's stdout/stderr to Loki via Docker SD.
  # Without this, Loki is empty (the OTel collector pipeline only handles
  # OTLP logs, and our Python app emits traces only — no log SDK exporter).
  promtail:
    image: grafana/promtail:3.2.1
    container_name: t2sql-promtail
    restart: unless-stopped
    networks: [t2sql-net]
    depends_on:
      loki:
        condition: service_healthy
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    volumes:
      - ../config/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro

  tempo:
    image: grafana/tempo:2.6.1
    container_name: t2sql-tempo
    restart: unless-stopped
    networks: [t2sql-net]
    command: ["-config.file=/etc/tempo/tempo-config.yml"]
    user: "0"
    volumes:
      - ../config/tempo/tempo-config.yml:/etc/tempo/tempo-config.yml:ro
      - tempo-data:/var/tempo
    ports:
      - "${TEMPO_PORT:-3200}:3200"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3200/ready"]
      interval: 15s
      timeout: 5s
      retries: 20

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    container_name: t2sql-otel-collector
    restart: unless-stopped
    networks: [t2sql-net]
    depends_on:
      tempo:
        condition: service_healthy
      loki:
        condition: service_healthy
    command: ["--config=/etc/otel/otel-config.yml"]
    volumes:
      - ../config/otel-collector/otel-config.yml:/etc/otel/otel-config.yml:ro
    ports:
      - "${OTEL_COLLECTOR_HTTP_PORT:-4318}:4318"   # OTLP HTTP
      - "${OTEL_COLLECTOR_GRPC_PORT:-4317}:4317"   # OTLP gRPC
      - "13133:13133"                              # health
      - "8889:8889"                                # collector-exported prom

  grafana:
    image: grafana/grafana:11.3.0
    container_name: t2sql-grafana
    restart: unless-stopped
    networks: [t2sql-net]
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin_dev_only}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    volumes:
      - grafana-data:/var/lib/grafana
      - ../config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 20
