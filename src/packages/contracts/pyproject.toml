[project]
name = "text2sql-contracts"
version = "0.1.0"
description = "Pydantic contracts shared across all text2sql services. Single source of truth for cross-layer I/O."
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7,<3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["text2sql_contracts"]
