# Prometheus scrape config — Phase 4 walking observability stack.
# Targets all in-network services exposing Prometheus exposition.

global:
  scrape_interval: 15s
  evaluation_interval: 30s
  external_labels:
    cluster: text2sql-local
    env: dev

rule_files:
  - /etc/prometheus/rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: langgraph-app
    metrics_path: /metrics
    static_configs:
      - targets: ["langgraph-app:8080"]
        labels:
          service: langgraph-app

  # LiteLLM exposes a /metrics endpoint when PROMETHEUS=true is set; harmless if absent.
  - job_name: litellm
    metrics_path: /metrics
    static_configs:
      - targets: ["litellm:4000"]
        labels:
          service: litellm

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
        labels:
          service: otel-collector

  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]
        labels:
          service: loki

  - job_name: tempo
    static_configs:
      - targets: ["tempo:3200"]
        labels:
          service: tempo
