<!DOCTYPE html>
<!--
  Text2SQL Platform — Briefing deck (PPT-style, static React single page), ENGLISH.
  · Fully local: React / ReactDOM / Babel are vendored under ./vendor — runs offline.
  · How to open: double-click this file. Pure static front-end.
  · Keys: ← → / Space to move · Home/End first/last · O contents · F fullscreen.
  · Style: financial-business (red / white / grey · hexagon mark · restrained whitespace).
-->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Text2SQL Platform · Natural-Language Data Queries for Banking</title>
<style>
  :root{
    --red:#DB0011; --red-dk:#A6000D; --red-soft:#fbe9ea;
    --ink:#1a1a1a; --ink-2:#3c3c3c; --muted:#6b6b6b; --faint:#9a9a9a;
    --paper:#ffffff; --backdrop:#e7e8ea; --wash:#f6f6f7; --wash-2:#f0f1f2;
    --hair:#dedede; --hair-2:#cfcfcf;
    --slate:#3f5d7a; --teal:#00817a; --ochre:#a56a00; --plum:#6c3f68; --moss:#4c6b3d; --steel:#59708a;
    --slate-s:#eaf0f5; --teal-s:#e3f2f0; --ochre-s:#f6efe2; --plum-s:#f2eaf1; --moss-s:#eef2ea; --red-s:#fbe9ea;
    --mono:'Cascadia Code','JetBrains Mono','Consolas','SFMono-Regular',monospace;
    --sans:'Helvetica Neue','Segoe UI',Arial,'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--sans); color:var(--ink); background:var(--backdrop);
    -webkit-font-smoothing:antialiased; overflow:hidden;
  }
  #root{height:100vh;width:100vw}

  /* ---------- deck shell ---------- */
  .backdrop{
    position:fixed;inset:0;
    background:
      radial-gradient(1200px 600px at 50% -10%, #f2f3f4 0%, var(--backdrop) 60%);
    display:flex;align-items:center;justify-content:center;overflow:hidden;
  }
  .topbar{position:fixed;top:0;left:0;right:0;height:4px;z-index:60;background:#d3d4d6}
  .topbar > i{display:block;height:100%;background:var(--red);transition:width .35s cubic-bezier(.4,0,.2,1)}

  .stage{
    position:absolute;top:50%;left:50%;
    width:1280px;height:720px;transform-origin:center center;
    background:var(--paper);
    box-shadow:0 24px 70px rgba(20,20,25,.22), 0 3px 10px rgba(20,20,25,.10);
    overflow:hidden;
  }
  .slide{position:absolute;inset:0;display:flex;flex-direction:column;animation:fade .34s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  /* content slide frame */
  .frame{display:flex;flex-direction:column;height:100%;padding:44px 64px 0}
  .kicker{font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--red);font-weight:700}
  .title{font-size:38px;line-height:1.1;font-weight:700;letter-spacing:-.01em;color:var(--ink);margin-top:8px}
  .title .en{color:var(--faint);font-weight:600;font-size:20px;letter-spacing:0;margin-left:10px}
  .rule{height:3px;width:64px;background:var(--red);margin:16px 0 0}
  .body{flex:1;min-height:0;padding:26px 0 0;display:flex;flex-direction:column}
  .foot{height:46px;flex:none;display:flex;align-items:center;justify-content:space-between;
    border-top:1px solid var(--hair);color:var(--faint);font-size:12.5px}
  .foot .fl{display:flex;align-items:center;gap:9px}
  .foot .fbrand{color:var(--ink-2);font-weight:600;letter-spacing:.01em}
  .foot .ftag{color:var(--faint)}
  .foot .fnum{font-variant-numeric:tabular-nums;letter-spacing:.06em}

  /* ---------- hexagon mark ---------- */
  .hex{display:inline-block;vertical-align:middle}

  /* ---------- primitives ---------- */
  .row{display:flex}
  .col{display:flex;flex-direction:column}
  .gap8{gap:8px}.gap12{gap:12px}.gap16{gap:16px}.gap20{gap:20px}.gap24{gap:24px}
  .grow{flex:1;min-width:0}
  .center{align-items:center}.between{justify-content:space-between}

  .card{background:var(--paper);border:1px solid var(--hair);border-radius:10px;padding:18px 20px}
  .card.wash{background:var(--wash)}
  .card.accent{border-left:4px solid var(--red)}
  .card h4{font-size:17px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:9px}
  .card p{font-size:14px;color:var(--ink-2);line-height:1.55;margin-top:7px}
  .card .lead{font-size:14.5px;color:var(--muted)}

  .chipnum{flex:none;width:26px;height:26px;border-radius:6px;background:var(--red);color:#fff;
    font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center}

  .tag{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;
    padding:3px 9px;border-radius:20px;background:var(--wash-2);color:var(--ink-2);border:1px solid var(--hair)}
  .tag.red{background:var(--red-s);color:var(--red-dk);border-color:#f2cfd2}
  .tag.slate{background:var(--slate-s);color:var(--slate);border-color:#d5e0ea}
  .tag.teal{background:var(--teal-s);color:var(--teal);border-color:#c9e6e2}
  .tag.ochre{background:var(--ochre-s);color:var(--ochre);border-color:#ecdcbf}
  .tag.plum{background:var(--plum-s);color:var(--plum);border-color:#e4cfe2}
  .tag.moss{background:var(--moss-s);color:var(--moss);border-color:#d3e0cb}
  .tag.ink{background:#efefef;color:var(--ink-2);border-color:var(--hair)}

  .mono{font-family:var(--mono)}
  .code{font-family:var(--mono);font-size:13.5px;line-height:1.6;color:#e8edf2;background:#1f2733;
    border-radius:9px;padding:14px 16px;white-space:pre;overflow:hidden}
  .code .k{color:#8fb7ff}.code .s{color:#a9e6a0}.code .c{color:#7f8a99}.code .n{color:#e6c07b}.code .f{color:#e59fce}

  .li{display:flex;gap:10px;align-items:flex-start;font-size:14.5px;color:var(--ink-2);line-height:1.5}
  .li .dot{flex:none;width:7px;height:7px;border-radius:50%;background:var(--red);margin-top:7px}
  .li b{color:var(--ink);font-weight:700}

  .kv{display:flex;justify-content:space-between;gap:12px;font-size:13.5px;padding:6px 0;border-bottom:1px dashed var(--hair)}
  .kv .k{color:var(--muted)}.kv .v{color:var(--ink);font-weight:600;font-family:var(--mono);font-size:12.8px}

  .stat{display:flex;flex-direction:column;gap:2px}
  .stat .n{font-size:34px;font-weight:800;letter-spacing:-.02em;color:var(--ink);line-height:1;font-variant-numeric:tabular-nums}
  .stat .n .u{font-size:16px;font-weight:700;color:var(--muted)}
  .stat .l{font-size:12.5px;color:var(--muted)}

  /* pipeline nodes */
  .node{border:1px solid var(--hair);border-radius:9px;background:#fff;padding:9px 11px;min-width:0;position:relative}
  .node .nm{font-family:var(--mono);font-size:12.5px;font-weight:700;color:var(--ink)}
  .node .sub{font-size:10.5px;color:var(--muted);margin-top:2px;line-height:1.3}
  .arrow{flex:none;display:flex;align-items:center;color:var(--faint);font-size:16px}

  /* layer bands */
  .band{display:flex;align-items:center;gap:14px;padding:9px 14px;border:1px solid var(--hair);border-bottom:none;background:#fff}
  .band:last-child{border-bottom:1px solid var(--hair)}
  .band:nth-child(even){background:var(--wash)}
  .band.hot{background:var(--red-s);border-color:#f0cdd0}
  .band .lx{flex:none;width:44px;height:30px;border-radius:6px;background:var(--ink);color:#fff;font-weight:800;
    font-size:13px;display:flex;align-items:center;justify-content:center;letter-spacing:.02em}
  .band.hot .lx{background:var(--red)}
  .band .nm{flex:none;width:190px;font-weight:700;font-size:14px;color:var(--ink)}
  .band .tech{flex:none;width:340px;font-size:12px;color:var(--slate);font-family:var(--mono)}
  .band .msn{flex:1;font-size:12.5px;color:var(--muted);text-align:right}

  /* viewport controls (unscaled) */
  .ui{position:fixed;z-index:50;bottom:16px;display:flex;align-items:center;gap:8px}
  .ui.left{left:18px}.ui.right{right:18px}
  .btn{border:1px solid var(--hair-2);background:rgba(255,255,255,.9);backdrop-filter:blur(6px);
    color:var(--ink-2);border-radius:8px;padding:8px 12px;font-size:12.5px;font-weight:600;cursor:pointer;
    font-family:var(--sans);display:inline-flex;align-items:center;gap:7px;transition:all .15s}
  .btn:hover{border-color:var(--red);color:var(--red)}
  .btn.circ{width:40px;height:40px;padding:0;justify-content:center;font-size:18px;border-radius:50%}
  .counter{font-size:12.5px;color:var(--muted);font-variant-numeric:tabular-nums;background:rgba(255,255,255,.85);
    border:1px solid var(--hair);border-radius:8px;padding:8px 12px;font-weight:600;letter-spacing:.05em}
  .langtog{display:inline-flex;border:1px solid var(--hair-2);border-radius:8px;overflow:hidden;background:rgba(255,255,255,.9);backdrop-filter:blur(6px)}
  .langtog button{border:none;background:transparent;color:var(--muted);font-family:var(--sans);font-weight:700;font-size:12.5px;padding:8px 11px;cursor:pointer;transition:all .15s}
  .langtog button.on{background:var(--red);color:#fff;cursor:default}
  .langtog button:not(.on):hover{color:var(--red)}

  /* overview */
  .ov{position:fixed;inset:0;z-index:80;background:rgba(28,28,30,.72);backdrop-filter:blur(4px);
    display:flex;flex-direction:column;padding:40px 56px;animation:fade .2s ease both}
  .ov h3{color:#fff;font-size:18px;font-weight:700;display:flex;align-items:center;gap:12px;margin-bottom:20px}
  .ov h3 .x{margin-left:auto;cursor:pointer;font-size:14px;color:#cfcfcf;border:1px solid #555;border-radius:6px;padding:5px 12px}
  .ovgrid{flex:1;display:grid;grid-template-columns:repeat(6,1fr);grid-auto-rows:min-content;gap:14px;overflow:auto;align-content:start}
  .ovc{background:#fff;border-radius:8px;padding:12px;cursor:pointer;border:2px solid transparent;transition:all .15s;min-height:82px;display:flex;flex-direction:column;gap:6px}
  .ovc:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.3)}
  .ovc.on{border-color:var(--red)}
  .ovc .oi{font-size:11px;font-weight:800;color:var(--red);font-variant-numeric:tabular-nums}
  .ovc .ot{font-size:13px;font-weight:700;color:var(--ink);line-height:1.25}
  .ovc .ok{font-size:10.5px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}

  .hint{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:40;font-size:11.5px;color:var(--faint);
    background:rgba(255,255,255,.7);border:1px solid var(--hair);border-radius:20px;padding:6px 14px;
    letter-spacing:.02em;transition:opacity .4s}

  /* cover */
  .cover{height:100%;display:flex;flex-direction:column;padding:0}
  .cover .band-top{height:8px;background:var(--red)}
  .cover .cmain{flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 84px}
  .cover .eyebrow{display:flex;align-items:center;gap:14px;color:var(--muted);font-size:13.5px;font-weight:600;letter-spacing:.12em;text-transform:uppercase}
  .cover h1{font-size:60px;line-height:1.05;font-weight:800;letter-spacing:-.02em;color:var(--ink);margin-top:22px}
  .cover h1 .accent{color:var(--red)}
  .cover .sub{font-size:21px;color:var(--ink-2);margin-top:20px;max-width:860px;line-height:1.45;font-weight:400}
  .cover .meta{display:flex;gap:10px;margin-top:34px;flex-wrap:wrap}
  .cover .cfoot{padding:20px 84px;border-top:1px solid var(--hair);display:flex;justify-content:space-between;align-items:center;color:var(--faint);font-size:13px}

  /* section divider */
  .divider{height:100%;display:flex;flex-direction:column;justify-content:center;padding:0 84px;background:linear-gradient(120deg,#fbfbfc,#f4f5f6)}
  .divider .dn{font-size:120px;font-weight:800;color:var(--red-soft);line-height:.9;letter-spacing:-.03em}
  .divider h2{font-size:44px;font-weight:800;color:var(--ink);letter-spacing:-.02em;margin-top:-30px}
  .divider p{font-size:18px;color:var(--muted);margin-top:14px;max-width:720px;line-height:1.5}
</style>
</head>
<body>
<div id="root"></div>

<script src="./vendor/react.production.min.js"></script>
<script src="./vendor/react-dom.production.min.js"></script>
<script src="./vendor/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, createContext, useContext } = React;

/* ===================== shared bits ===================== */
const Deck = createContext({ cur:0, total:0 });

function Hex({ size=34 }){
  return (
    <span className="hex" style={{width:size,height:size}}>
      <svg viewBox="0 0 100 100" width={size} height={size} aria-hidden="true">
        <polygon points="25,6.7 75,6.7 100,50 75,93.3 25,93.3 0,50" fill="#DB0011"/>
        <polygon points="25,6.7 75,6.7 50,50" fill="#ffffff"/>
        <polygon points="25,93.3 75,93.3 50,50" fill="#ffffff"/>
      </svg>
    </span>
  );
}

const ICONS = {
  shield:"M12 3l7 3v5c0 4.4-3 8.3-7 9.5C8 19.3 5 15.4 5 11V6l7-3z",
  link:"M9 15l6-6M8.5 8.5l-2 2a3.5 3.5 0 105 5l2-2M15.5 15.5l2-2a3.5 3.5 0 10-5-5l-2 2",
  code:"M8 8l-4 4 4 4M16 8l4 4-4 4M13 5l-2 14",
  check:"M4 12l5 5L20 6",
  db:"M12 4c4 0 7 1.1 7 2.5S16 9 12 9 5 7.9 5 6.5 8 4 12 4zM5 6.5v11C5 19 8 20 12 20s7-1 7-2.5v-11",
  chart:"M4 20V6M4 20h16M9 20v-6M14 20v-9M19 20v-4",
  gear:"M12 9a3 3 0 100 6 3 3 0 000-6zM19 12l1.5 1-1.2 2.9-1.8-.4-1.3 1.3.4 1.8L12 22l-1.9-1.5.4-1.8-1.3-1.3-1.8.4L6.5 15 8 14v-2l-1.5-1 1.2-2.9 1.8.4 1.3-1.3-.4-1.8L12 2l1.9 1.5-.4 1.8 1.3 1.3 1.8-.4L19 9l-1.5 1z",
  eye:"M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7zM12 9a3 3 0 100 6 3 3 0 000-6z",
  lock:"M6 10V7a6 6 0 1112 0v3M5 10h14v10H5z",
  route:"M6 19a2 2 0 100-4 2 2 0 000 4zM18 9a2 2 0 100-4 2 2 0 000 4zM8 17h6a3 3 0 003-3V9",
  filter:"M3 5h18l-7 8v5l-4 2v-7z",
  refresh:"M20 11a8 8 0 10-2 5M20 5v6h-6",
  spark:"M12 3l2.2 6.2L20 11l-5.8 1.8L12 19l-2.2-6.2L4 11l5.8-1.8z",
  bolt:"M13 2L4 14h6l-1 8 9-12h-6z",
  clock:"M12 3a9 9 0 100 18 9 9 0 000-18zM12 7.5V12l3 2"
};
function Icon({ name, size=20, color="var(--red)", w=1.9 }){
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke={color} strokeWidth={w} strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
      <path d={ICONS[name]||""} />
    </svg>
  );
}

function Stage({ kicker, title, en, children, tone }){
  const { cur, total } = useContext(Deck);
  return (
    <div className="frame">
      <div>
        {kicker && <div className="kicker">{kicker}</div>}
        <div className="title">{title}{en && <span className="en">{en}</span>}</div>
        <div className="rule" style={tone?{background:tone}:null}/>
      </div>
      <div className="body">{children}</div>
      <div className="foot">
        <div className="fl"><Hex size={17}/><span className="fbrand">Text2SQL Platform</span>
          <span className="ftag">· CIB Data &amp; Analytics · Internal</span></div>
        <div className="fnum">{String(cur+1).padStart(2,"0")} / {String(total).padStart(2,"0")}</div>
      </div>
    </div>
  );
}

const Li = ({ children }) => <div className="li"><span className="dot"/><span>{children}</span></div>;

/* ===================== slides ===================== */

// 1 — Cover
function Cover(){
  return (
    <div className="cover">
      <div className="band-top"/>
      <div className="cmain">
        <div className="eyebrow"><Hex size={30}/> Text2SQL Platform · Enterprise Solution Briefing</div>
        <h1>Query bank data<br/>in <span className="accent">plain language</span>. Safely.</h1>
        <div className="sub">For RM (Relationship Manager), Risk, Compliance, Operations and Finance —
          self-service data access that is safe, accurate, auditable, and <b>transparent at every step</b>.</div>
        <div className="meta">
          <span className="tag red"><Icon name="spark" size={13} color="var(--red-dk)"/> Powered by OpenAI GPT</span>
          <span className="tag slate">8-layer architecture</span>
          <span className="tag teal">7-step secure journey · self-repair</span>
          <span className="tag ochre">11 containers · Docker Compose</span>
          <span className="tag ink">115 tests passing</span>
        </div>
      </div>
      <div className="cfoot">
        <span>Start it with: <span className="mono" style={{color:"var(--ink-2)"}}>.\t2sql.ps1 start min</span></span>
        <span>2026 · Briefing</span>
      </div>
    </div>
  );
}

// 2 — Agenda
function Agenda(){
  const items = [
    ["01","Business pain & value","Why — request backlog, over-access, PII (personal-data) leakage, metric drift, no audit trail","spark"],
    ["02","Architecture & layers","What — 8-layer architecture · 11 containers · explicit contracts","gear"],
    ["03","The full journey of a question","How — Permission → Semantics → SQL → Validation → Execution → Analysis","route"],
    ["04","Middleware missions & transparency","Why each middleware exists, and how the whole chain stays observable","eye"],
    ["05","Security, compliance & SLO","Hard constraints · control matrix · Service-Level Objectives (SLO)","shield"],
  ];
  return (
    <Stage kicker="Agenda" title="What we will cover">
      <div className="col gap12" style={{marginTop:4}}>
        {items.map(([n,t,d,ic])=>(
          <div className="card row center gap16" key={n} style={{padding:"15px 20px"}}>
            <div className="chipnum" style={{width:34,height:34,fontSize:16,background:"var(--ink)"}}>{n}</div>
            <Icon name={ic} size={22}/>
            <div className="grow">
              <div style={{fontSize:19,fontWeight:700}}>{t}</div>
              <div style={{fontSize:13.5,color:"var(--muted)",marginTop:2}}>{d}</div>
            </div>
            <span className="arrow">▶</span>
          </div>
        ))}
      </div>
    </Stage>
  );
}

// 3 — Pain points
function Pain(){
  const cards = [
    ["Data-request backlog","Business files a ticket → queues behind the data team for days; analysis is gated by IT.","clock"],
    ["Over-access risk","Who may see which clients and tables? Enforced by manual review and verbal rules — hard to audit.","lock"],
    ["PII (personal-data) leakage","Names, account numbers and emails flow in plain SQL and results — one leak is a compliance incident.","shield"],
    ["Metric drift","The same metric, written as different SQL (Structured Query Language) by different people — reports don't reconcile.","link"],
    ["No audit trail","When something breaks, you can't answer who, when, with what rights, queried what.","eye"],
  ];
  return (
    <Stage kicker="Why · Business pain" title="Five chronic ills of the “file-a-ticket” model">
      <div className="row gap16" style={{alignItems:"stretch"}}>
        <div className="col gap12" style={{flex:1.15}}>
          {cards.slice(0,3).map(([t,d,ic])=>(
            <div className="card accent" key={t}>
              <h4><Icon name={ic} size={19}/>{t}</h4><p>{d}</p>
            </div>
          ))}
        </div>
        <div className="col gap12" style={{flex:1.15}}>
          {cards.slice(3).map(([t,d,ic])=>(
            <div className="card accent" key={t}>
              <h4><Icon name={ic} size={19}/>{t}</h4><p>{d}</p>
            </div>
          ))}
          <div className="card wash" style={{background:"var(--ink)",border:"none",color:"#fff",flex:1,display:"flex",flexDirection:"column",justifyContent:"center"}}>
            <div style={{fontSize:14,color:"#e9c9cc",fontWeight:600,letterSpacing:".04em"}}>In one line</div>
            <div style={{fontSize:19,fontWeight:700,marginTop:8,lineHeight:1.4}}>
              The business wants <span style={{color:"#ff8b96"}}>answers</span> —<br/>not to learn SQL, nor to wait in a queue.</div>
          </div>
        </div>
      </div>
    </Stage>
  );
}

// 4 — Value
function Value(){
  const pillars = [
    ["Self-service","spark","Plain language → results in seconds; frees the data team from repetitive pulls."],
    ["Security built-in","shield","Injection / over-access blocked 100% (hard target); PII masked on the way in and out."],
    ["Trustworthy","lock","Read-only, forced row limit, identity pass-through; one trace ID per query, kept ≥ 7 years."],
    ["Consistent","link","A semantic layer + curated schema cards fix business definitions into retrieval and prompts."],
    ["Replaceable","gear","Each layer exposes capability via an explicit contract; any component upgrades on its own."],
    ["Observable","eye","Langfuse trace + Prometheus metrics + Grafana dashboards — the whole process is transparent."],
  ];
  return (
    <Stage kicker="Why · Value" title="From “data pulls” to a pipeline you can trust">
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginTop:2}}>
        {pillars.map(([t,ic,d])=>(
          <div className="card" key={t} style={{display:"flex",flexDirection:"column",gap:8}}>
            <div className="row center gap12">
              <div style={{width:38,height:38,borderRadius:9,background:"var(--red-s)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <Icon name={ic} size={20}/></div>
              <div style={{fontSize:17.5,fontWeight:700}}>{t}</div>
            </div>
            <p style={{margin:0}}>{d}</p>
          </div>

function StageValidate(){

              still unsafe → <span className="mono">REFUSED · SQL_UNSAFE</span>. The metric <span className="mono">self_repair_total</span> is observable.</p></div>
        </div>
        <div className="col gap12" style={{flex:.95}}>
          <div className="code" style={{flex:1}}>
<span className="c"># validation result (SqlValidationResult)</span>{"\n"}
{"{"}{"\n"}
  <span className="n">"safe"</span>: <span className="k">true</span>,{"\n"}
  <span className="n">"tables_used"</span>: [<span className="s">"client"</span>,<span className="s">"country_ref"</span>],{"\n"}
  <span className="n">"violations"</span>: [],{"\n"}
  <span className="n">"sql"</span>: <span className="s">"SELECT … LIMIT 1000"</span>{"\n"}
{"}"}
          </div>
          <div className="row gap8" style={{flexWrap:"wrap"}}>

        </div>
      </div>
    </Stage>
  );
}

    ["slate","schema_link","Top-2: client (0.82) · country_ref (0.76)","RAG"],
    ["teal","sql_generate","SELECT c.cif_id, c.legal_name, c.aum_usd …","gen"],
    ["ochre","sql_validate","safe · tables=[client,country_ref] · LIMIT injected","SAFE"],
    ["red","opa_check","role=RM → allow · obligation row_filter","ALLOW"],
    ["red","row_filter","wrap EXISTS: client.rm_owner='alice@bank'","inject"],
    ["moss","execute","12 rows · 240ms · X-Trino-User=alice@bank","OK"],
    ["plum","explain+mask","“12 active Singapore clients…” · 0 cells masked","OK"],

  return (
    <Stage kicker="So managers see it clearly" title="A worked example: one question through every gate">
      <div className="row gap16" style={{alignItems:"stretch"}}>
        <div className="col grow" style={{flex:1.4}}>
          <div className="card wash" style={{padding:"12px 16px",marginBottom:10}}>

          <div className="card" style={{background:"var(--moss-s)",border:"1px solid #d3e0cb"}}>
            <div className="row between center"><h4 style={{fontSize:14.5}}>Final response · QueryResponse</h4><span className="tag moss">status: OK</span></div>
            <div className="col gap6" style={{marginTop:8}}>
              <div className="kv"><span className="k">rows</span><span className="v">12</span></div>
              <div className="kv"><span className="k">tables_used</span><span className="v">client, country_ref</span></div>
              <div className="kv"><span className="k">latency_ms</span><span className="v">≈ 3,100</span></div>

          <div className="card" style={{background:"var(--red-s)",border:"1px solid #f2cfd2"}}>

            <p style={{marginTop:6,fontSize:12.8}}>“<span className="mono">ignore previous… DROP TABLE client</span>”

      </div>
    </Stage>
  );
}

// 16 — Middleware missions

    ["S7","End-to-end audit","Langfuse hot store + archive + Loki"],

  ];
  const slo = [["100%","Injection / over-access blocked"],["≥99%","Refusal precision"],["≥95%","Semantic-linking recall"],["≤8s","P95 (95th-pct) latency"],["≤$0.02","Cost per query"],["115","Tests passing"]];
  return (
    <Stage kicker="⑤ Security · Compliance · SLO (Service-Level Objective)" title="Security is a hard constraint from Day 1" tone="var(--red)">

  {k:"Cover",        t:"Cover",              C:Cover},
  {k:"Agenda",       t:"Agenda",             C:Agenda},
  {k:"Why",          t:"Business pain",      C:Pain},
  {k:"Why",          t:"Value",              C:Value},
  {k:"What",         t:"8-layer architecture",C:Layers},
  {k:"What",         t:"Topology",           C:Topology},
  {k:"How",          t:"Section · the journey",C:SectionJourney},
  {k:"How",          t:"7-step overview",    C:Pipeline},
  {k:"① Permission", t:"Permission",         C:StagePermission},
  {k:"② Semantics",  t:"Semantics",          C:StageSemantic},
  {k:"③ SQL",        t:"Draft SQL",          C:StageGenerate},
  {k:"④ Validate",   t:"Validate + repair",  C:StageValidate},
  {k:"⑤ Execute",    t:"Get results",        C:StageExecute},
  {k:"⑥ Analyze",    t:"Analyze",            C:StageAnalyze},
  {k:"Example",      t:"Worked example",     C:Example},
  {k:"Middleware",   t:"Middleware",         C:Middleware},
  {k:"Transparency", t:"Transparency",       C:Observability},
  {k:"Security",     t:"Security & SLO",     C:Security},
  {k:"Close",        t:"Get started",        C:Close},
];

/* ===================== app shell ===================== */
const ZH_DECK = "index.html", EN_DECK = "index.en.html";
const IS_ZH = false;   // this file is the English deck
function readHashIndex(){
  if (typeof location === "undefined") return 0;
  const h = parseInt((location.hash || "").replace("#",""), 10);
  return (Number.isInteger(h) && h >= 0 && h < DECK.length) ? h : 0;
}

function App(){
  const total = DECK.length;
  const [cur,setCur] = useState(readHashIndex);
  const [scale,setScale] = useState(1);
  const [ov,setOv] = useState(false);
  const [hint,setHint] = useState(true);

  const go = useCallback((n)=>setCur(c=>Math.max(0,Math.min(total-1, typeof n==="function"?n(c):n))),[total]);
  const goLang = (file)=>{ if(typeof location!=="undefined") location.href = file + "#" + cur; };

  useEffect(()=>{ if(typeof history!=="undefined"){ try{ history.replaceState(null,"","#"+cur); }catch(e){} } },[cur]);

  useEffect(()=>{
    const fit=()=>setScale(Math.min(window.innerWidth/1280, (window.innerHeight)/720));
    fit(); window.addEventListener("resize",fit); return ()=>window.removeEventListener("resize",fit);
  },[]);
  useEffect(()=>{ const t=setTimeout(()=>setHint(false),4200); return ()=>clearTimeout(t); },[]);
  useEffect(()=>{
    const onKey=(e)=>{
      if(e.key==="o"||e.key==="O"){ setOv(v=>!v); return; }
      if(ov){ if(e.key==="Escape") setOv(false); return; }
      if(["ArrowRight","PageDown"," ","Enter","l"].includes(e.key)){ e.preventDefault(); go(c=>c+1); }
      else if(["ArrowLeft","PageUp","h"].includes(e.key)){ e.preventDefault(); go(c=>c-1); }
      else if(e.key==="Home"){ go(0); }
      else if(e.key==="End"){ go(total-1); }
      else if(e.key==="f"||e.key==="F"){ if(!document.fullscreenElement) document.documentElement.requestFullscreen?.(); else document.exitFullscreen?.(); }
      else if(e.key==="t"||e.key==="T"){ goLang(IS_ZH?EN_DECK:ZH_DECK); }
    };
    window.addEventListener("keydown",onKey); return ()=>window.removeEventListener("keydown",onKey);
  },[ov,go,total,cur]);

  const Current = DECK[cur].C;
  return (
    <Deck.Provider value={{cur,total}}>
      <div className="topbar"><i style={{width:((cur+1)/total*100)+"%"}}/></div>
      <div className="backdrop">
        <div className="stage" style={{transform:`translate(-50%,-50%) scale(${scale})`}}>
          <div className="slide" key={cur}><Current/></div>
        </div>
      </div>

      <div className="ui left">
        <button className="btn circ" onClick={()=>go(c=>c-1)} title="Previous (←)">‹</button>
      </div>
      <div className="ui right">
        <div className="langtog" title="Language · 切换语言 (T)">
          <button className={IS_ZH?"on":""} onClick={()=>{ if(!IS_ZH) goLang(ZH_DECK); }}>中文</button>
          <button className={!IS_ZH?"on":""} onClick={()=>{ if(IS_ZH) goLang(EN_DECK); }}>EN</button>
        </div>
        <span className="counter">{String(cur+1).padStart(2,"0")} / {total}</span>
        <button className="btn" onClick={()=>setOv(true)} title="Contents (O)"><Icon name="gear" size={14} color="currentColor"/>Contents</button>
        <button className="btn" onClick={()=>{ if(!document.fullscreenElement) document.documentElement.requestFullscreen?.(); else document.exitFullscreen?.(); }} title="Fullscreen (F)">Fullscreen</button>
        <button className="btn circ" onClick={()=>go(c=>c+1)} title="Next (→)">›</button>
      </div>

      {hint && <div className="hint">← → or Space to move · O contents · F fullscreen · T 中/EN · Home/End</div>}

      {ov && (
        <div className="ov" onClick={()=>setOv(false)}>
          <h3><Hex size={22}/> Text2SQL Platform · Contents <span className="x" onClick={()=>setOv(false)}>Close ✕</span></h3>
          <div className="ovgrid" onClick={e=>e.stopPropagation()}>
            {DECK.map((d,i)=>(
              <div key={i} className={"ovc"+(i===cur?" on":"")} onClick={()=>{ go(i); setOv(false); }}>
                <div className="oi">{String(i+1).padStart(2,"0")}</div>
                <div className="ot">{d.t}</div>
                <div className="ok">{d.k}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </Deck.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
